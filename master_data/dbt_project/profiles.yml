master_data:
  target: development
  outputs:
    development:
      type: starrocks
      host: "{{ env_var('STARROCKS_HOST') }}"
      port: "{{ env_var('STARROCKS_PORT') | as_number }}"
      user: "{{ env_var('STARROCKS_USER') }}"
      username: "{{ env_var('STARROCKS_USER') }}"
      password: "{{ env_var('STARROCKS_PASSWORD', '') }}"
      dbname: "{{ env_var('STARROCKS_DB') }}"
      schema: "master_data"
      threads: 4
      init_connect: 
        - "SET new_planner_optimize_timeout = 60000"

    sandbox:
      type: starrocks
      host: "{{ env_var('STARROCKS_HOST') }}"
      port: "{{ env_var('STARROCKS_PORT') | as_number }}"
      user: "{{ env_var('STARROCKS_USER') }}"
      username: "{{ env_var('STARROCKS_USER') }}"
      password: "{{ env_var('STARROCKS_PASSWORD', '') }}"
      dbname: retail_sandbox
      schema: "master_data"
      threads: 4

    production:
      type: starrocks
      host: "{{ env_var('STARROCKS_HOST') }}"
      port: "{{ env_var('STARROCKS_PORT') | as_number }}"
      user: "{{ env_var('STARROCKS_USER') }}"
      username: "{{ env_var('STARROCKS_USER') }}"
      password: "{{ env_var('STARROCKS_PASSWORD', '') }}"
      dbname: retail_prod
      schema: "master_data"
      threads: 8
