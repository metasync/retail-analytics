
version: 2

models:
  - name: stg_customers
    description: "Staging table for customers, cleaned and normalized."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_products
    description: "Staging table for products, cleaned and normalized."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Staging table for orders, cleaned and normalized."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

  - name: stg_order_items
    description: "Staging table for order items (line items)."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      # Composite key unique test
    tests:
      - unique:
          arguments:
            column_name: "concat(order_id, '-', product_id)"
